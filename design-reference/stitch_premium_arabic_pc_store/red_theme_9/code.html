<!-- Success Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.body;
            const colors = ['#bb0010', '#00628e', '#ab332c', '#ff7164'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-particle';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = '50%';
                confetti.style.top = '40%';
                
                container.appendChild(confetti);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 15;
                const tx = Math.cos(angle) * (100 + Math.random() * 200);
                const ty = Math.sin(angle) * (100 + Math.random() * 200);
                const rot = Math.random() * 360;
                
                confetti.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards'
                });
            }
        });

        // Simple button haptics/click interaction simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // In a real app, this would trigger navigation
                console.log('Button clicked:', btn.innerText);
            });
        });
    </script>
