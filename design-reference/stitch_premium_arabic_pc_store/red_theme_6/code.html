<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>

                "on-primary-fixed-variant": "#93000a",

                "secondary": "#ab332c",
                "error-container": "#ffdad6",
                "surface": "#fff8f7",

                "surface-variant": "#fddbd6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-nav {
            background: rgba(255, 248, 247, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .step-active {
            box-shadow: 0 0 0 4px rgba(187, 0, 16, 0.1);
        }
        input:focus {
            box-shadow: 0 0 0 4px rgba(187, 0, 16, 0.1) !important;
            border-color: #bb0010 !important;
        }
        .summary-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .summary-open .summary-content {
            max-height: 500px;
        }
        .summary-open .expand-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 glass-nav shadow-sm h-16 flex items-center px-4">
<div class="flex items-center justify-between w-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">إتمام الشراء</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto">
<!-- Order Progress -->
<div class="flex justify-between items-center mb-8 px-6">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold step-active">1</div>
<span class="font-label-sm text-label-sm text-primary">الشحن</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2 opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold">2</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">الدفع</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2 opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-bold">3</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">التأكيد</span>
</div>
</div>
<!-- Order Summary Accordion -->
<section class="bg-surface-container-low rounded-xl border border-outline-variant mb-6 overflow-hidden transition-all duration-300" id="order-summary-accordion">
<button class="w-full flex items-center justify-between p-4 focus:outline-none" onclick="document.getElementById('order-summary-accordion').classList.toggle('summary-open')">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">shopping_basket</span>
<span class="font-label-bold text-label-bold">ملخص الطلب (3 قطع)</span>
</div>
<div class="flex items-center gap-2">
<span class="font-label-bold text-label-bold text-primary">4,850 ر.س</span>
<span class="material-symbols-outlined expand-icon transition-transform duration-300">expand_more</span>
</div>
</button>
<div class="summary-content px-4">
<div class="space-y-4 pb-4 border-t border-outline-variant pt-4">
<!-- Item 1 -->
<div class="flex gap-3">
<div class="w-16 h-16 rounded-lg bg-white border border-outline-variant flex-shrink-0" data-alt="A high-end NVIDIA RTX 4080 graphics card with intricate cooling fans and sleek metallic accents, captured in professional studio lighting with a clean white background and subtle red accents to match the retail theme. The mood is technical and premium." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC2iKshuBCSQNAjCjW1IeM4WlRgkelMR_AgRmIX3i75sYuAwQM4hwJ9F3T6xqgnPnYsV192DP2gVu2k9b3Hn5BJBhuiHrffFNXFmbcCKjsBnc3TMjnvSyq-yJq6Zyti8mtcjP2GXH-Y63xbFN4GGCux09ByP8srJniDD1k12IrICvbfzOEY8XoW5S_QoEhO0UyZDw6y1ABS-zrj_yT5DqqYZffcDPz-KBvOB1XGoL34iiX6qura8bly')"></div>
<div class="flex-1">
<h4 class="font-label-bold text-label-bold text-on-surface line-clamp-1">NVIDIA GeForce RTX 4080</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">الكمية: 1</p>
<span class="font-label-bold text-label-bold text-primary">4,200 ر.س</span>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-3">
<div class="w-16 h-16 rounded-lg bg-white border border-outline-variant flex-shrink-0" data-alt="A set of high-performance DDR5 RAM sticks with RGB lighting and premium heat spreaders. The lighting is set to a warm red hue, and the product is shown in a crisp light-mode environment against a minimal gray background for high contrast." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDPjDYMgUQEcIcZM_HxA55DOUpDeU8qO2eFvuRCCR5mSg1G5j_brpR1Gbzpyr9Si2t05pihoZccbeoxZSBHhtfecAfYJgAyprcnoH4HjPjn3zsB202Gc4ZNETU8sx_KD4h0mEf-4sCPZl6f9D4Dv2xuskLdNiZOxOOWj0q528Fb-FV-sRIuKZ3Q06h4rVroIWXS8n2czoIk-CpDBTVkE1eytXgxdAPyNRgCcDUERJZWR6EuvgKZZIpd')"></div>
<div class="flex-1">
<h4 class="font-label-bold text-label-bold text-on-surface line-clamp-1">Corsair Vengeance DDR5 32GB</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">الكمية: 2</p>
<span class="font-label-bold text-label-bold text-primary">650 ر.س</span>
</div>
</div>
</div>
</div>
</section>
<!-- Customer Details Form -->
<section class="mb-8">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-4">تفاصيل الشحن</h2>
<div class="space-y-4">
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant pr-1">الاسم الكامل</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:outline-none transition-all duration-200 font-body-md text-body-md" placeholder="مثال: أحمد محمد" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant pr-1">رقم الجوال</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:outline-none transition-all duration-200 font-body-md text-body-md text-left" dir="ltr" placeholder="05xxxxxxxx" type="tel"/>
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-label-bold">+966</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant pr-1">المدينة</label>
<select class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:outline-none transition-all duration-200 font-body-md text-body-md appearance-none">
<option>الرياض</option>
<option>جدة</option>
<option>الدمام</option>
</select>
</div>
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant pr-1">الحي</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:outline-none transition-all duration-200 font-body-md text-body-md" placeholder="مثال: النرجس" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant pr-1">العنوان بالتفصيل</label>
<textarea class="w-full p-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:outline-none transition-all duration-200 font-body-md text-body-md" placeholder="الشارع، رقم المبنى، الشقة" rows="2"></textarea>
</div>
</div>
</section>
<!-- Payment Selection -->
<section class="mb-8">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-4">طريقة الدفع</h2>
<div class="space-y-3">
<!-- InstaPay -->
<label class="relative flex items-center p-4 bg-white border-2 border-primary rounded-xl cursor-pointer transition-all duration-200 active:scale-[0.98]">
<input checked="" class="hidden" name="payment" type="radio" value="instapay"/>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center ml-4">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
<div class="flex-1">
<span class="font-label-bold text-label-bold block">InstaPay (دفع إلكتروني سريع)</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">خصم إضافي 2% عند الدفع الإلكتروني</span>
</div>
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
</label>
<!-- COD -->
<label class="relative flex items-center p-4 bg-surface-container-lowest border-2 border-outline-variant rounded-xl cursor-pointer transition-all duration-200 hover:border-primary-container active:scale-[0.98]">
<input class="hidden" name="payment" type="radio" value="cod"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center ml-4"></div>
<div class="flex-1">
<span class="font-label-bold text-label-bold block">الدفع عند الاستلام</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">رسوم إضافية 25 ر.س</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">payments</span>
</label>
</div>
</section>
<!-- Trust Badges -->
<div class="flex items-center justify-around py-6 border-t border-outline-variant opacity-70">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">security</span>
<span class="font-label-sm text-label-sm">دفع آمن</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">local_shipping</span>
<span class="font-label-sm text-label-sm">شحن سريع</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span class="font-label-sm text-label-sm">ضمان أصلي</span>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 w-full bg-surface-container-lowest shadow-[0_-8px_24px_rgba(0,0,0,0.08)] px-4 py-4 pb-safe flex flex-col gap-3 rounded-t-2xl z-50">
<div class="flex justify-between items-center px-2">
<span class="font-label-bold text-label-bold text-on-surface-variant">الإجمالي النهائي:</span>
<span class="font-headline-sm text-headline-sm text-primary">4,875 ر.س</span>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-label-bold text-body-lg rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-all duration-200">
<span>تأكيد الطلب والدفع</span>
<span class="material-symbols-outlined">arrow_back</span>
</button>
</footer>
<script>
        // Micro-interaction for payment selection
        const paymentOptions = document.querySelectorAll('input[name="payment"]');
        paymentOptions.forEach(opt => {
            opt.addEventListener('change', (e) => {
                paymentOptions.forEach(p => {
                    const parent = p.closest('label');
                    const radioCircle = parent.querySelector('.w-6');
                    const innerCircle = radioCircle.querySelector('.w-3') || document.createElement('div');
                    
                    if(p.checked) {
                        parent.classList.add('border-primary', 'bg-white');
                        parent.classList.remove('border-outline-variant', 'bg-surface-container-lowest');
                        radioCircle.classList.add('border-primary');
                        radioCircle.classList.remove('border-outline-variant');
                        if(!radioCircle.contains(innerCircle)) {
                            innerCircle.className = 'w-3 h-3 rounded-full bg-primary';
                            radioCircle.appendChild(innerCircle);
                        }
                    } else {
                        parent.classList.remove('border-primary', 'bg-white');
                        parent.classList.add('border-outline-variant', 'bg-surface-container-lowest');
                        radioCircle.classList.remove('border-primary');
                        radioCircle.classList.add('border-outline-variant');
                        if(radioCircle.contains(innerCircle)) {
                            radioCircle.removeChild(innerCircle);
                        }
                    }
                });
            });
        });
    </script>
</body></html>
